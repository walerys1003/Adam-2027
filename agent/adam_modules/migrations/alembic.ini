# Alembic — migracje adam_modules.
# Uruchomienie: cd agent/adam_modules/migrations && alembic upgrade head
# URL bazy sterowany zmienną ADAM_DATABASE_URL (nadpisuje sqlalchemy.url).
[alembic]
script_location = .
prepend_sys_path = ../..
sqlalchemy.url = sqlite:///adam_dev.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
