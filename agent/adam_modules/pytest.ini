[pytest]
# WP-4 — konfiguracja testów pakietu adam_modules (uruchamialny zestaw 430+).
asyncio_mode = auto
testpaths =
    tests
python_files =
    test_*.py
markers =
    integration: testy wymagające usług zewnętrznych
    unit: testy jednostkowe (bez zależności)
    slow: testy >1s

# Bramka pokrycia (WP-4): twardy próg 85% (baseline realny ~97%).
# Uruchamiaj z katalogu adam_modules:
#   ADAM_PII_KEY=... ADAM_PII_PEPPER=... pytest
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=.
    --cov-report=term-missing:skip-covered
    --cov-fail-under=85

[coverage:run]
source = .
omit =
    tests/*
    */test_*.py
    */__pycache__/*
    */migrations/*
    */archived/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = True
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
