name: Admin UI URL Validation

# Verifies model download artifacts plus the external API/documentation links
# surfaced by the Admin UI. No credentials or full model downloads are used.
#
# Runs on:
#   - PRs that touch Admin UI URLs, the catalog, or either checker
#   - Weekly on main (catches upstream repo deletions between PRs)
#   - Manual dispatch (sanity check on demand)

on:
  pull_request:
    paths:
      - "admin_ui/backend/api/models_catalog.py"
      - "admin_ui/backend/api/**"
      - "admin_ui/frontend/src/**"
      - "scripts/check_admin_ui_urls.py"
      - "scripts/check_catalog_urls.py"
      - "tests/test_admin_ui_url_checker.py"
      - ".github/workflows/catalog-url-check.yml"
  push:
    branches: [main]
    paths:
      - "admin_ui/backend/api/models_catalog.py"
      - "admin_ui/backend/api/**"
      - "admin_ui/frontend/src/**"
      - "scripts/check_admin_ui_urls.py"
      - "scripts/check_catalog_urls.py"
      - "tests/test_admin_ui_url_checker.py"
  schedule:
    # Sundays 06:00 UTC — quiet hour, low chance of overlap with weekday PRs
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  check-urls:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write  # only used by the open-issue step on scheduled failure
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate model catalog URLs
        id: catalog
        run: |
          set -o pipefail
          python scripts/check_catalog_urls.py 2>&1 | tee model_url_report.txt
        continue-on-error: true

      - name: Validate Admin UI API and documentation URLs
        id: admin_ui
        run: |
          set -o pipefail
          python scripts/check_admin_ui_urls.py 2>&1 | tee admin_ui_url_report.txt
        continue-on-error: true

      - name: Upload URL validation reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: admin-ui-url-reports
          path: |
            model_url_report.txt
            admin_ui_url_report.txt

      - name: Fail non-scheduled runs if any URL broke
        if: (steps.catalog.outcome == 'failure' || steps.admin_ui.outcome == 'failure') && github.event_name != 'schedule'
        run: |
          echo "::error::Admin UI URL validation failed. See report artifacts for details."
          exit 1

      - name: Open tracking issue (scheduled run only)
        if: (steps.catalog.outcome == 'failure' || steps.admin_ui.outcome == 'failure') && github.event_name == 'schedule'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const modelReport = fs.readFileSync('model_url_report.txt', 'utf8');
            const adminReport = fs.readFileSync('admin_ui_url_report.txt', 'utf8');
            const sections = [];
            if ('${{ steps.catalog.outcome }}' === 'failure') {
              sections.push('## Model catalog', modelReport);
            }
            if ('${{ steps.admin_ui.outcome }}' === 'failure') {
              sections.push('## Admin UI API/documentation links', adminReport);
            }
            const report = sections.join('\n\n');
            const title = 'Admin UI URL validation failed (scheduled run)';
            // De-dupe by title; this does not depend on a repository-specific label.
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug',
              per_page: 100,
            });
            const existing = openIssues.find((issue) => issue.title === title);
            const body = [
              'The weekly Admin UI URL validation found broken model, API, or documentation links.',
              '',
              'Run: ' + context.payload.repository.html_url + '/actions/runs/' + context.runId,
              '',
              '```',
              report.trim().slice(-3000),
              '```',
            ].join('\n');
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                labels: ['bug', 'dependencies'],
                body: body,
              });
            }
