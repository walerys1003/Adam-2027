name: Backend CI (adam_modules)

on:
  push:
    branches: [ main ]
    paths:
      - 'agent/adam_modules/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'agent/adam_modules/**'

jobs:
  test:
    name: pytest + migracje Alembic
    runs-on: ubuntu-latest
    env:
      ADAM_PII_KEY: ci-test-key-adam-2027
      ADAM_PII_PEPPER: ci-test-pepper
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: agent
        run: |
          python -m pip install --upgrade pip
          pip install -r adam_modules/requirements.txt

      - name: Run test suite (F1–F18)
        working-directory: agent
        run: python -m pytest adam_modules/tests/ -q

      - name: Verify Alembic migrations (0001–0007, SQLite)
        working-directory: agent/adam_modules/migrations
        run: |
          python -m alembic upgrade head
          python -m alembic current | grep -q '0007' || (echo "head != 0007" && exit 1)
          python -m alembic downgrade base
          python -m alembic upgrade head

> **Uwaga:** aby aktywować CI w GitHub Actions, przenieś ten plik do `.github/workflows/backend-ci.yml` (wymaga uprawnienia `workflows`).
