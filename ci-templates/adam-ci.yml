name: Adam CI

# CI Adama (ETAP 34): backend pytest (adam_modules) + bramka migracji Alembic +
# frontend vitest. Uruchamiane przy push/PR na main i staging oraz ręcznie.

on:
  push:
    branches: [ main, staging ]
    paths:
      - 'agent/adam_modules/**'
      - 'frontend/**'
      - '.github/workflows/adam-ci.yml'
  pull_request:
    branches: [ main, staging ]
  workflow_dispatch:

concurrency:
  group: adam-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================ BACKEND
  backend:
    name: Backend (pytest adam_modules)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    env:
      # sekrety wymagane przez PII (szyfrowanie) — wartości testowe, nie produkcyjne
      ADAM_PII_KEY: dev-test
      ADAM_PII_PEPPER: dev-pepper
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: agent/adam_modules/requirements.txt

      - name: Install dependencies (adam_modules)
        run: |
          python -m pip install --upgrade pip
          pip install -r adam_modules/requirements.txt

      - name: Run backend test suite + coverage gate (WP-4, --cov-fail-under=85)
        working-directory: agent/adam_modules
        env:
          PYTHONPATH: ${{ github.workspace }}/agent
        run: |
          # pytest.ini w adam_modules wymusza --cov-fail-under=85 (realny baseline ~97%)
          python -m pytest -q --maxfail=1

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: agent/adam_modules/coverage.xml
          if-no-files-found: ignore

  # ============================================================ MIGRACJE (BRAMKA ALEMBIC)
  migrations:
    name: Alembic migration gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    env:
      ADAM_PII_KEY: dev-test
      ADAM_PII_PEPPER: dev-pepper
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: agent/adam_modules/requirements.txt

      - name: Install dependencies (adam_modules)
        run: |
          python -m pip install --upgrade pip
          pip install -r adam_modules/requirements.txt

      - name: Alembic upgrade head (chain 0001→HEAD)
        env:
          PYTHONPATH: ${{ github.workspace }}/agent
          ADAM_DATABASE_URL: sqlite:////tmp/adam_ci.db
        working-directory: agent/adam_modules/migrations
        run: |
          rm -f /tmp/adam_ci.db
          python -m alembic upgrade head

      - name: Verify migrations are current (no pending autogenerate diff)
        env:
          PYTHONPATH: ${{ github.workspace }}/agent
          ADAM_DATABASE_URL: sqlite:////tmp/adam_ci.db
        working-directory: agent/adam_modules/migrations
        run: |
          # bramka: HEAD musi być pojedynczy (brak rozjazdu gałęzi migracji)
          heads=$(python -m alembic heads | grep -c '(head)')
          echo "Liczba HEAD-ów migracji: $heads"
          test "$heads" -eq 1

  # ============================================================ FRONTEND
  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm run test

      - name: Build (typecheck + vite build)
        run: npm run build

# ────────────────────────────────────────────────────────────────────
# INSTALACJA: skopiuj ten plik do .github/workflows/adam-ci.yml
#   mkdir -p .github/workflows && cp ci-templates/adam-ci.yml .github/workflows/
# Umieszczony w ci-templates/, bo token GitHub App bez uprawnienia
# `workflows` nie może tworzyć/aktualizować plików w .github/workflows/.
# Właściciel repo z pełnymi uprawnieniami przenosi plik do docelowej lokalizacji.
# ────────────────────────────────────────────────────────────────────
